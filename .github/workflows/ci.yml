# Workflow for mlightcad CI/CD
name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  main:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@mlightcad'

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm lint

      - name: Build projects
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          pnpm run build

      - name: Run tests
        run: pnpm test

      - name: Build API docs
        run: pnpm doc

      # Authenticates via npm Trusted Publishing (OIDC); no NPM_TOKEN needed.
      # Configure each package on npmjs.com → Settings → Trusted publishing:
      #   Provider: GitHub Actions
      #   Repository: mlightcad/realdwg-web
      #   Workflow filename: ci.yml
      #   Environment: release  (must match the job environment below)
      - name: Publish packages to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          npm --version
          # setup-node writes an empty _authToken line that blocks OIDC fallback
          if [ -f "$HOME/.npmrc" ]; then
            sed -i '/_authToken/d' "$HOME/.npmrc"
          fi
          pnpm publish:package

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true

      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: './docs/'

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v5
